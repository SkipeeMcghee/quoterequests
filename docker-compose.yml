version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: quote_requests_postgres
    environment:
      POSTGRES_DB: quote_requests
      POSTGRES_USER: quote_requests
      POSTGRES_PASSWORD: quote_requests
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: