<header class="site-header site-header--brochure">
  <div class="site-header__lead">
    <a class="brand" href="{{ url_for('main.index') }}">{{ business_name }}</a>
    <div class="site-header__copy">
      <strong>{{ tagline }}</strong>
      <span>Serving {{ service_area }}</span>
    </div>
  </div>

  <div class="site-header__nav-group">
    <nav class="site-nav site-nav--brochure" aria-label="Primary navigation">
      <a href="{{ url_for('main.index') }}" {% if request.endpoint == 'main.index' %}aria-current="page"{% endif %}>Home</a>
      <a href="{{ url_for('main.services_page') }}" {% if request.endpoint == 'main.services_page' %}aria-current="page"{% endif %}>Services</a>
      <a href="{{ url_for('main.about_page') }}" {% if request.endpoint == 'main.about_page' %}aria-current="page"{% endif %}>About</a>
      <a href="{{ url_for('main.contact_page') }}" {% if request.endpoint == 'main.contact_page' %}aria-current="page"{% endif %}>Contact</a>
    </nav>

    <div class="site-header__actions">
      <a class="btn btn-primary btn-small" href="{{ url_for('main.quote_request') }}">Get a Quote</a>
      <div class="site-utility-nav">
        <a href="tel:{{ phone }}">{{ phone }}</a>
        <a href="mailto:{{ email }}">{{ email }}</a>
      </div>
    </div>
  </div>
</header>
